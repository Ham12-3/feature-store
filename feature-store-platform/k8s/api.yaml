apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: feature-store
  labels:
    app: api
    app.kubernetes.io/part-of: feature-store-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: feature-store-platform/api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: feature-store-config
          volumeMounts:
            - name: feast-config
              mountPath: /app/feast_repo/feature_store.yaml
              subPath: feature_store.yaml
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
      volumes:
        - name: feast-config
          configMap:
            name: feast-repo-config

---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: feature-store
  labels:
    app: api
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
