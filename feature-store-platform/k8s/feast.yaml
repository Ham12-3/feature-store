apiVersion: apps/v1
kind: Deployment
metadata:
  name: feast
  namespace: feature-store
  labels:
    app: feast
    app.kubernetes.io/part-of: feature-store-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: feast
  template:
    metadata:
      labels:
        app: feast
    spec:
      containers:
        - name: feast
          image: feature-store-platform/feast:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6566
          envFrom:
            - configMapRef:
                name: feature-store-config
          volumeMounts:
            - name: feast-config
              mountPath: /app/feature_store.yaml
              subPath: feature_store.yaml
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 6566
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 6566
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: feast-config
          configMap:
            name: feast-repo-config

---
apiVersion: v1
kind: Service
metadata:
  name: feast
  namespace: feature-store
  labels:
    app: feast
spec:
  selector:
    app: feast
  ports:
    - port: 6566
      targetPort: 6566
